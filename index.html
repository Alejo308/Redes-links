<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loreax - Links</title>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/fontsource-poppins@5.0.8/index.css');
        @import url('https://cdn.jsdelivr.net/npm/fontsource-playfair-display@5.0.8/index.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            overflow-x: hidden;
            position: relative;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/imagen/imagen.png') center/cover no-repeat;
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(10, 10, 10, 0.7) 0%,
                rgba(10, 10, 10, 0.5) 30%,
                rgba(10, 10, 10, 0.6) 70%,
                rgba(10, 10, 10, 0.95) 100%
            );
            z-index: 1;
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6a00;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
            box-shadow: 0 0 6px #ff6a00, 0 0 12px #ff3300;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 16px;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
        }

        .avatar-ring {
            position: absolute;
            top: -4px;
            left: -4px;
            width: 128px;
            height: 128px;
            border-radius: 50%;
            background: conic-gradient(#ff6a00, #ff3300, #ff6a00, #ffaa00, #ff6a00);
            animation: rotateRing 3s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #0a0a0a;
            overflow: hidden;
            z-index: 1;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .username {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 106, 0, 0.5);
            margin-bottom: 4px;
        }

        .bio {
            color: #b0b0b0;
            font-size: 0.95rem;
            font-weight: 400;
            max-width: 300px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .links-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-btn {
            position: relative;
            display: block;
            width: 100%;
            border: 1px solid rgba(255, 106, 0, 0.3);
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            background: transparent;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
            z-index: 1;
            pointer-events: none;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(255, 160, 0, 0.6);
            box-shadow: 0 8px 30px rgba(255, 106, 0, 0.3);
        }

        .link-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .link-btn img {
            width: 100%;
            height: 70px;
            display: block;
            border-radius: 16px;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .footer p {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: none;
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        .footer p .highlight {
            color: rgba(255, 106, 0, 0.5);
            font-weight: 500;
        }

        .fire-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff6a00, transparent);
            margin: 20px auto;
            border-radius: 2px;
        }

        @media (max-width: 600px) {
            .main-container {
                padding: 30px 10px;
            }

            .links-container {
                max-width: 100%;
            }

            .username {
                font-size: 1.5rem;
            }

            .bio {
                font-size: 0.85rem;
            }

            .avatar-wrapper {
                width: 100px;
                height: 100px;
            }

            .avatar-ring {
                width: 108px;
                height: 108px;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .link-btn img {
                height: 58px;
            }

            .footer p {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }
        }

        .link-btn:nth-child(1) { animation: fadeInUp 0.6s ease-out 0.4s both; }
        .link-btn:nth-child(2) { animation: fadeInUp 0.6s ease-out 0.5s both; }
        .link-btn:nth-child(3) { animation: fadeInUp 0.6s ease-out 0.6s both; }

        .page-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 106, 0, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="page-glow"></div>

    <div class="particles-container" id="particles"></div>

    <div class="main-container">

        <div class="profile-section">
            <div class="avatar-wrapper">
                <div class="avatar-ring"></div>
                <div class="avatar">
                    <img src="assets/imagen/avatar.png" alt="Loreax">
                </div>
            </div>

            <h1 class="username">Loreax</h1>
            <p class="bio">🔥 Creador de Contenido | Jugador casual 🗿</p>
        </div>

        <div class="links-container">

            <a href="https://discord.gg/U53zbUNvZ" target="_blank" class="link-btn">
                <img src="assets/imagen/Discord.png" alt="Discord">
            </a>

            <a href="https://www.tiktok.com/@kevinmedina3235?_r=1&_t=ZS-95ucf2OAH2a" target="_blank" class="link-btn">
                <img src="assets/imagen/TikTok.png" alt="TikTok">
            </a>

            <a href="https://chat.whatsapp.com/Gk0z1xpx4X81mZDsOLnimQ" target="_blank" class="link-btn">
                <img src="assets/imagen/WhatsApp.png" alt="WhatsApp">
            </a>

        </div>

        <div class="fire-line"></div>

        <div class="footer">
            <p>Made by <span class="highlight">Andrés</span></p>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 35;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const size = Math.random() * 4 + 2;
                const leftPos = Math.random() * 100;
                const duration = Math.random() * 6 + 4;
                const delay = Math.random() * 8;
                const hue = Math.random() * 30;

                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = leftPos + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                particle.style.background = `hsl(${hue}, 100%, ${50 + Math.random() * 20}%)`;
                particle.style.boxShadow = `0 0 ${size * 2}px hsl(${hue}, 100%, 50%), 0 0 ${size * 4}px hsl(${hue}, 100%, 40%)`;

                container.appendChild(particle);
            }
        }

        createParticles();

        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.style.cssText = `
                    position: absolute;
                    width: 20px;
                    height: 20px;
                    background: rgba(255, 106, 0, 0.4);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: rippleEffect 0.6s ease-out;
                    pointer-events: none;
                    z-index: 2;
                `;

                const rect = btn.getBoundingClientRect();
                ripple.style.left = (e.clientX - rect.left - 10) + 'px';
                ripple.style.top = (e.clientY - rect.top - 10) + 'px';

                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                to {
                    transform: scale(10);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        const pageGlow = document.querySelector('.page-glow');
        document.addEventListener('mousemove', (e) => {
            pageGlow.style.left = e.clientX + 'px';
            pageGlow.style.top = e.clientY + 'px';
        });
    </script>

</body>
</html>
